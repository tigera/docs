<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Gateway WAF request flow">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7.5" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#4a5568"/></marker>
    <marker id="arrowp" markerWidth="9" markerHeight="9" refX="7.5" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#6b46c1"/></marker>
    <marker id="arrowr" markerWidth="9" markerHeight="9" refX="7.5" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#c53030"/></marker>
  </defs>

  <rect x="4" y="4" width="932" height="352" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- write-time guardrail -->
  <rect x="192" y="22" width="240" height="72" rx="8" fill="#faf5ff" stroke="#6b46c1" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="312" y="47" text-anchor="middle" font-size="13" font-weight="600" fill="#44337a">Admission webhook</text>
  <text x="312" y="65" text-anchor="middle" font-size="11" fill="#553c9a">directive allowlist +</text>
  <text x="312" y="81" text-anchor="middle" font-size="11" fill="#553c9a">per-namespace SecRule ID range</text>

  <!-- inputs -->
  <rect x="24" y="178" width="212" height="64" rx="8" fill="#eef2f7" stroke="#4a5568" stroke-width="1.5"/>
  <text x="130" y="205" text-anchor="middle" font-size="12" font-weight="600" fill="#1a202c">GlobalWAFPolicy + WAFPolicy</text>
  <text x="130" y="223" text-anchor="middle" font-size="12" font-weight="600" fill="#1a202c">GlobalWAFPlugin + WAFPlugin</text>

  <!-- merge -->
  <rect x="270" y="182" width="92" height="56" rx="8" fill="#eef2f7" stroke="#4a5568" stroke-width="1.5"/>
  <text x="316" y="214" text-anchor="middle" font-size="13" font-weight="600" fill="#1a202c">Merge</text>

  <!-- directives -->
  <rect x="396" y="182" width="148" height="56" rx="8" fill="#eef2f7" stroke="#4a5568" stroke-width="1.5"/>
  <text x="470" y="207" text-anchor="middle" font-size="12" font-weight="600" fill="#1a202c">Ordered SecLang</text>
  <text x="470" y="224" text-anchor="middle" font-size="12" font-weight="600" fill="#1a202c">directives</text>

  <!-- validation diamond -->
  <polygon points="632,166 694,210 632,254 570,210" fill="#fffbea" stroke="#b7791f" stroke-width="1.5"/>
  <text x="632" y="206" text-anchor="middle" font-size="12" font-weight="600" fill="#744210">Rego</text>
  <text x="632" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#744210">validation</text>

  <!-- EEP -->
  <rect x="726" y="178" width="200" height="64" rx="8" fill="#e6f0ff" stroke="#2b6cb0" stroke-width="1.5"/>
  <text x="826" y="205" text-anchor="middle" font-size="12" font-weight="600" fill="#1a365d">EnvoyExtensionPolicy</text>
  <text x="826" y="223" text-anchor="middle" font-size="12" fill="#2a4365">Coraza WASM filter</text>

  <!-- Envoy gateway -->
  <rect x="726" y="288" width="200" height="46" rx="8" fill="#e6fffa" stroke="#2c7a7b" stroke-width="1.5"/>
  <text x="826" y="316" text-anchor="middle" font-size="12" font-weight="600" fill="#234e52">Envoy Gateway &#8594; request</text>

  <!-- fail box -->
  <rect x="470" y="288" width="190" height="46" rx="8" fill="#fff5f5" stroke="#c53030" stroke-width="1.5"/>
  <text x="565" y="308" text-anchor="middle" font-size="12" font-weight="600" fill="#742a2a">No filter programmed</text>
  <text x="565" y="324" text-anchor="middle" font-size="11" fill="#9b2c2c">status reports the violation</text>

  <!-- arrows -->
  <line x1="236" y1="210" x2="266" y2="210" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="362" y1="210" x2="392" y2="210" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="544" y1="210" x2="566" y2="210" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="694" y1="210" x2="722" y2="210" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="708" y="201" text-anchor="middle" font-size="11" font-weight="600" fill="#276749">pass</text>
  <line x1="826" y1="242" x2="826" y2="284" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- write-time guardrail arrow into Merge -->
  <line x1="312" y1="94" x2="312" y2="178" stroke="#6b46c1" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrowp)"/>
  <text x="322" y="140" text-anchor="start" font-size="11" fill="#553c9a">at apply</text>
  <!-- fail branch -->
  <path d="M632,254 L632,272 L565,272 L565,284" fill="none" stroke="#c53030" stroke-width="1.5" marker-end="url(#arrowr)"/>
  <text x="560" y="266" text-anchor="middle" font-size="11" font-weight="600" fill="#9b2c2c">fail (Enforce + Critical)</text>
</svg>
