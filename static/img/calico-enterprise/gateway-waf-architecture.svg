<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Gateway WAF request flow">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7.5" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 z" fill="#4a5568"/>
    </marker>
    <marker id="arrowp" markerWidth="9" markerHeight="9" refX="7.5" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 z" fill="#6b46c1"/>
    </marker>
  </defs>

  <rect x="4" y="4" width="912" height="332" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- write-time guardrail -->
  <rect x="250" y="20" width="262" height="52" rx="8" fill="#faf5ff" stroke="#6b46c1" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="381" y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#44337a">Admission webhook</text>
  <text x="381" y="58" text-anchor="middle" font-size="11" fill="#553c9a">directive allowlist + per-namespace SecRule ID range</text>

  <!-- inputs -->
  <rect x="16" y="150" width="200" height="60" rx="8" fill="#eef2f7" stroke="#4a5568" stroke-width="1.5"/>
  <text x="116" y="175" text-anchor="middle" font-size="12" font-weight="600" fill="#1a202c">GlobalWAFPolicy + WAFPolicy</text>
  <text x="116" y="193" text-anchor="middle" font-size="12" font-weight="600" fill="#1a202c">GlobalWAFPlugin + WAFPlugin</text>

  <!-- merge -->
  <rect x="250" y="152" width="96" height="56" rx="8" fill="#eef2f7" stroke="#4a5568" stroke-width="1.5"/>
  <text x="298" y="184" text-anchor="middle" font-size="13" font-weight="600" fill="#1a202c">Merge</text>

  <!-- directives -->
  <rect x="376" y="152" width="140" height="56" rx="8" fill="#eef2f7" stroke="#4a5568" stroke-width="1.5"/>
  <text x="446" y="177" text-anchor="middle" font-size="12" font-weight="600" fill="#1a202c">Ordered SecLang</text>
  <text x="446" y="194" text-anchor="middle" font-size="12" font-weight="600" fill="#1a202c">directives</text>

  <!-- validation diamond -->
  <polygon points="610,138 670,180 610,222 550,180" fill="#fffbea" stroke="#b7791f" stroke-width="1.5"/>
  <text x="610" y="177" text-anchor="middle" font-size="12" font-weight="600" fill="#744210">Rego</text>
  <text x="610" y="193" text-anchor="middle" font-size="12" font-weight="600" fill="#744210">validation</text>

  <!-- EEP -->
  <rect x="700" y="150" width="206" height="60" rx="8" fill="#e6f0ff" stroke="#2b6cb0" stroke-width="1.5"/>
  <text x="803" y="175" text-anchor="middle" font-size="12" font-weight="600" fill="#1a365d">EnvoyExtensionPolicy</text>
  <text x="803" y="193" text-anchor="middle" font-size="12" fill="#2a4365">Coraza WASM filter</text>

  <!-- Envoy gateway -->
  <rect x="700" y="268" width="206" height="48" rx="8" fill="#e6fffa" stroke="#2c7a7b" stroke-width="1.5"/>
  <text x="803" y="297" text-anchor="middle" font-size="12" font-weight="600" fill="#234e52">Envoy Gateway &#8594; request</text>

  <!-- fail box -->
  <rect x="455" y="268" width="190" height="48" rx="8" fill="#fff5f5" stroke="#c53030" stroke-width="1.5"/>
  <text x="550" y="288" text-anchor="middle" font-size="12" font-weight="600" fill="#742a2a">No filter programmed</text>
  <text x="550" y="304" text-anchor="middle" font-size="11" fill="#9b2c2c">status reports the violation</text>

  <!-- arrows -->
  <line x1="216" y1="180" x2="246" y2="180" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="346" y1="180" x2="372" y2="180" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="516" y1="180" x2="546" y2="180" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="670" y1="180" x2="696" y2="180" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="683" y="172" text-anchor="middle" font-size="11" font-weight="600" fill="#276749">pass</text>
  <line x1="803" y1="210" x2="803" y2="264" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- fail branch -->
  <path d="M598,210 L598,242 L550,242 L550,264" fill="none" stroke="#c53030" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="548" y="236" text-anchor="middle" font-size="11" font-weight="600" fill="#9b2c2c">fail (Enforce + Critical)</text>
  <!-- webhook at apply -->
  <path d="M340,72 L300,128 L300,150" fill="none" stroke="#6b46c1" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrowp)"/>
  <text x="262" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#553c9a">at apply</text>
</svg>
