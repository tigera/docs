# Online Boutique microservices demo (namespaced)
#
# Adapted from Google's microservices-demo, licensed under Apache 2.0.
# https://github.com/GoogleCloudPlatform/microservices-demo
#
# Each service is placed in its own namespace so that Calico Cloud
# Service Graph shows a rich cross-namespace topology.
# All cross-service env vars use <service>.<namespace> DNS format.

# --------------------------------------------------------------------------
# adservice
# --------------------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: adservice
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: adservice
  namespace: adservice
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adservice
  namespace: adservice
spec:
  selector:
    matchLabels:
      app: adservice
  template:
    metadata:
      labels:
        app: adservice
    spec:
      serviceAccountName: adservice
      terminationGracePeriodSeconds: 5
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: server
        image: us-central1-docker.pkg.dev/google-samples/microservices-demo/adservice:v0.10.5
        ports:
        - containerPort: 9555
        env:
        - name: PORT
          value: "9555"
        resources:
          requests:
            cpu: 200m
            memory: 180Mi
          limits:
            cpu: 300m
            memory: 300Mi
        readinessProbe:
          initialDelaySeconds: 20
          periodSeconds: 15
          grpc:
            port: 9555
        livenessProbe:
          initialDelaySeconds: 20
          periodSeconds: 15
          grpc:
            port: 9555
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: adservice
  namespace: adservice
spec:
  type: ClusterIP
  selector:
    app: adservice
  ports:
  - name: grpc
    port: 9555
    targetPort: 9555
---
