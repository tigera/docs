---
extends: existence
message: "'%s' is missing an indirect object. Use 'walks you through' (or rewrite with 'covers', 'describes', or 'explains')."
level: error
ignorecase: true
scope: text
# Fires only when 'through' immediately follows the verb (no indirect object
# between them). Correct usage like 'walks you through' has words between the
# verb and 'through' and won't match.
tokens:
  - '\bwalks?\s+through\b'
  - '\bwalking\s+through\b'
