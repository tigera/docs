---
extends: existence
message: "'%s' is missing an indirect object. Add one (e.g., 'walks you through') or rewrite with 'covers', 'describes', or 'explains'."
level: error
ignorecase: true
scope: text
# Targets the 'guide' sense — when an inanimate subject (a page, guide, or
# set of steps) is implicitly guiding the reader, 'walk through' is transitive
# and needs an indirect object. The collective sense ("we'll walk through
# these steps together") doesn't need one and isn't matched.
tokens:
  - '\bwalks\s+through\b'
  - '\b(?:steps|procedures|sections|tutorials|chapters|exercises|labs|articles)\s+walk\s+through\b'
